apiVersion: v1
kind: Secret
metadata:
  name: agentprobe-secrets
  namespace: default
type: Opaque
# Values must be base64-encoded: echo -n 'yourvalue' | base64
# Copy this file to secrets.yaml, fill in real values, and apply:
#   kubectl apply -f k8s/secrets.yaml
# secrets.yaml is in .gitignore — never commit it.
data:
  POSTGRES_USER: cG9zdGdyZXM=        # base64("postgres") — change in production
  POSTGRES_PASSWORD: CHANGEME==       # base64("yourpassword") — MUST change
  POSTGRES_URL: CHANGEME==            # base64("postgresql://user:pass@postgres-service:5432/agentprobe")
  GROQ_API_KEY: ""                    # base64("gsk_...") — set if using Groq
  AGENTPROBE_API_KEY: ""              # base64("your-secret") — set to protect the API
