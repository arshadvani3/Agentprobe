---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: default
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: default
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: agentprobe-api-service
  namespace: default
spec:
  selector:
    app: agentprobe-api
  ports:
    - port: 8000
      targetPort: 8000
---
# Frontend exposed externally via LoadBalancer (GKE assigns a public IP)
apiVersion: v1
kind: Service
metadata:
  name: agentprobe-frontend-service
  namespace: default
spec:
  type: LoadBalancer
  selector:
    app: agentprobe-frontend
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: chroma-pvc
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
