apiVersion: v1
kind: ConfigMap
metadata:
  name: agentprobe-config
  namespace: default
data:
  # POSTGRES_URL is stored in agentprobe-secrets (not here) to keep credentials out of ConfigMap
  # See secrets.example.yaml for the Secret template
  REDIS_URL: "redis://redis-service:6379"
  CHROMADB_PATH: "/app/data/chromadb"
  OLLAMA_BASE_URL: "http://ollama-service:11434"
  OLLAMA_MODEL: "llama3.1:8b"
  LOG_LEVEL: "INFO"
