services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: agentprobe
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: redis-server --save ""  # no disk persistence — cache/pubsub only
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      POSTGRES_URL: postgresql://postgres:postgres@postgres:5432/agentprobe
      REDIS_URL: redis://redis:6379
      # LLM: set GROQ_API_KEY to use Groq; leave empty to use local Ollama
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.1-8b-instant}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1:8b}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:3000}
      AGENTPROBE_API_KEY: ${AGENTPROBE_API_KEY:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"  # reach Ollama on host from container
    volumes:
      - ./backend/test_suites:/app/backend/test_suites  # hot-reload YAML suites
      - chroma_data:/app/data/chromadb

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    depends_on:
      - api
    environment:
      # nginx proxy target — use docker-compose service name
      API_BACKEND_URL: http://api:8000
    ports:
      - "80:80"

volumes:
  postgres_data:
  chroma_data:
